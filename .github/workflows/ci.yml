name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - chore/primeiras-correcoes-seguranca

jobs:
  quality:
    name: Qualidade
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: pnpm

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm typecheck

      - name: Build frontend-only
        run: pnpm build:frontend-only
        env:
          FRONTEND_ONLY: "true"
